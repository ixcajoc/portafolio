<app-navbar></app-navbar>

<!-- FEATURED PROJECTS -->
    <section class="py-xl" id="projects">
      <div class="px-gutter max-w-container-max mx-auto">
        <div class="flex flex-col md:flex-row md:items-end justify-between mb-lg gap-md">
          <div>
            <h2 class="font-headline-md text-headline-md text-primary mb-xs">Proyectos</h2>
            <p class="text-on-surface-variant">Una selección de mis construcciones</p>
          </div>
          <a class="inline-flex items-center gap-xs text-primary font-bold hover:underline" href="#projects">
            Regresar <span class="material-symbols-outlined">arrow_forward</span>
          </a>
        </div>

        <!-- Bento Grid Layout -->
        <!-- <div class="grid grid-cols-1 md:grid-cols-12 gap-md h-auto md:h-[800px]"> -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-md h-auto">

          <!-- Projects: Small cards -->
          @for (proyect of proyects; track $index) {


              <div class="md:col-span-4 md:row-span-1 group relative rounded-3xl overflow-hidden glass-card min-h-[300px]">
                <div class="absolute inset-0 bg-cover bg-center transition-transform duration-1000 group-hover:scale-110"
                  data-alt="A dark-themed developer tool website with an integrated code editor and collaboration features. The interface is filled with technical accents, monospaced fonts, and a sleek sidebar. The lighting focuses on the primary code editor area, which is displaying a colorful syntax-highlighted script, surrounded by a sophisticated glass-like shell."
                  style="background-image: url('{{ proyect.bg_proyect }}')">
                </div>
                <div class="absolute inset-0 bg-gradient-to-t from-background via-background/10 to-transparent opacity-100">
                </div>
                <div class="absolute bottom-0 left-0 p-md  ">
                  <div class="flex gap-xs">  
                    <span 
                      class="px-3 py-1 bg-black/30 border border-primary/30 rounded-full font-label-caps text-[10px] text-primary uppercase mb-xs inline-block"
                      *ngFor="let tech of proyect.technologies">{{tech}}
                    </span>
                    
                  </div>

                  <h3 class="font-bold text-xl">{{ proyect.name }}</h3> 
                  <p class="text-muted-foreground">{{ proyect.description }}</p>
                </div>
  
                <!-- icons -->
                <div class="absolute top-0 right-0 p-md flex gap-xs">
                  <a *ngIf="proyect.previewViewUrl!" class="w-14 h-14 rounded-full bg-primary text-on-primary flex items-center justify-center hover:scale-110 active:scale-95 transition-all" href="{{ proyect.previewViewUrl }}" target="_blank">
                    <span class="material-symbols-outlined">launch</span>
                  </a>
                  <a *ngIf="proyect.frontendUrl!" class="w-14 h-14 rounded-full bg-primary text-on-primary flex items-center justify-center hover:scale-110 active:scale-95 transition-all" href="{{ proyect.frontendUrl }}" target="_blank">
                    <span class="material-symbols-outlined">view_quilt</span>
                  </a>
                  <a *ngIf="proyect.backendUrl!" class="w-14 h-14 rounded-full bg-primary text-on-primary flex items-center justify-center hover:scale-110 active:scale-95 transition-all" href="{{ proyect.backendUrl }}" target="_blank">
                    <span class="material-symbols-outlined">storage</span>
                  </a>
                </div>
              </div>
            }

            <!-- <app-proyect-card [proyect]="proyect"></app-proyect-card> -->
         

        </div>
      </div>
    </section>

<app-footer></app-footer>
